name: Test & Deploy 

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker compose -f docker-compose.yml build backend

      - name: Start dependencies (PostgreSQL & Redis)
        run: docker compose -f docker-compose.yml up -d db redis

      - name: Wait for PostgreSQL to be ready
        run: |
          until docker compose -f docker-compose.yml exec -T db pg_isready -U user; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations & tests
        run: |
          docker compose -f docker-compose.yml run --rm backend \
            sh -c "alembic upgrade head && pytest"

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.yml down
        
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Connect and Execute Commands
        uses: appleboy/ssh-action@master
        with:
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          script: |
             git pull origin main
             docker-compose down
             docker-compose -f docker-compose-stage.yml up -d --build
