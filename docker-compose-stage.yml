version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_DB: postgres 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    expose:
      - 5232
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    container_name: redis
    image: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  backend:
    build:
      context: .
      dockerfile: ./dockerfiles/prod/Dockerfile
    env_file:
      - ./envs/dev/.env
    working_dir: /usr/src/core
    container_name: backend
    volumes:
      - ./core:/usr/src/core
    ports:
      - 8000:8000
    depends_on:
      - db
      - redis


  celery_worker:
    build:
      context: .
      dockerfile: ./dockerfiles/dev/Dockerfile
    env_file:
      - ./envs/dev/.env
    working_dir: /usr/src/core
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    container_name: celery_worker
    volumes:
      - ./core:/usr/src/core
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: ./dockerfiles/dev/Dockerfile
    env_file:
      - ./envs/dev/.env
    working_dir: /usr/src/core
    command: celery -A config.celery beat --loglevel=info
    container_name: celery_beat
    volumes:
      - ./core:/usr/src/core
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped
